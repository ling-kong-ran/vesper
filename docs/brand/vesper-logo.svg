<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Vesper">
  <title>Vesper</title>
  <!-- 墨 V + 暖金星 · 单图形双色扁平标。暗色环境下墨色自动反白、星金提亮（浏览器 favicon / 直接引用均生效）。 -->
  <style>
    .v-ink { fill: #17141F; }
    .v-star { fill: #F59E0B; }
    @media (prefers-color-scheme: dark) {
      .v-ink { fill: #F4F2EC; }
      .v-star { fill: #FBBF24; }
    }
  </style>
  <path class="v-ink" d="M3.5 13 L10.5 13 L21 29.5 L31.5 13 L38.5 13 L21 42 Z"/>
  <path class="v-star" d="M41 1 Q41.9 5.1 46 6 Q41.9 6.9 41 11 Q40.1 6.9 36 6 Q40.1 5.1 41 1 Z"/>
</svg>
