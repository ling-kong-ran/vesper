<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Vesper · 产品演示</title>
  <style>
    :root {
      --ink: #111114;
      --ink-soft: #1b1b20;
      --paper: #ffffff;
      --paper-soft: #f5f5f6;
      --blue: #2878ff;
      --blue-bright: #70a6ff;
      --line: rgba(255, 255, 255, .12);
      --line-soft: rgba(255, 255, 255, .07);
      --text: rgba(255, 255, 255, .94);
      --muted: rgba(255, 255, 255, .54);
      --glass: rgba(24, 24, 28, .72);
      --shadow: 0 40px 110px rgba(0, 0, 0, .48);
      --ease: cubic-bezier(.22, 1, .36, 1);
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body {
      overflow: hidden;
      color: var(--text);
      background: var(--ink);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    button { color: inherit; font: inherit; }
    .hidden { display: none !important; }

    .opening {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 42%, color-mix(in srgb, var(--blue) 24%, transparent), transparent 27%),
        radial-gradient(circle at 15% 88%, color-mix(in srgb, var(--blue) 10%, transparent), transparent 30%),
        var(--ink);
      transition: opacity .9s var(--ease), visibility .9s;
    }
    .opening::before,
    .opening::after {
      content: "";
      position: absolute;
      inset: -25%;
      background-image: radial-gradient(circle, var(--paper) 0 1px, transparent 1.4px);
      background-size: 58px 58px;
      opacity: .1;
      animation: stars 18s linear infinite;
    }
    .opening::after { opacity: .045; transform: rotate(23deg) scale(.78); animation-duration: 27s; }
    .opening.is-leaving { opacity: 0; visibility: hidden; }
    .opening-core { position: relative; z-index: 2; display: grid; justify-items: center; text-align: center; }
    .orbit {
      position: absolute;
      width: min(64vw, 650px);
      aspect-ratio: 1;
      border: 1px solid var(--line);
      border-radius: 50%;
      animation: orbit-in 1.5s var(--ease) both, spin 22s linear 1.5s infinite;
    }
    .orbit::before, .orbit::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 28px color-mix(in srgb, var(--blue) 75%, transparent);
    }
    .orbit::before { width: 9px; height: 9px; left: 9%; top: 27%; }
    .orbit::after { width: 5px; height: 5px; right: 11%; bottom: 23%; background: var(--blue-bright); }
    .brand-logo { width: 116px; height: 116px; opacity: 0; transform: scale(.7) rotate(-8deg); animation: logo-in 1.05s .28s var(--ease) forwards; }
    .opening h1 { margin: 16px 0 0; font-size: clamp(58px, 8.5vw, 112px); line-height: .95; letter-spacing: -.075em; opacity: 0; transform: translateY(24px); animation: title-in 1s .65s var(--ease) forwards; }
    .opening p { margin: 18px 0 0; color: var(--muted); font-size: clamp(11px, 1.3vw, 16px); font-weight: 650; letter-spacing: .34em; text-transform: uppercase; opacity: 0; animation: fade-in .8s 1.12s ease forwards; }
    .launch-line { position: absolute; bottom: 9vh; width: min(430px, 58vw); height: 2px; overflow: hidden; background: var(--line-soft); }
    .launch-line::after { content: ""; display: block; width: 44%; height: 100%; background: linear-gradient(90deg, transparent, var(--blue), var(--paper)); animation: launch 2.15s 1.05s var(--ease) both; }

    .showcase {
      position: relative;
      width: 100vw;
      height: 100vh;
      padding: clamp(18px, 3vw, 48px);
      background:
        radial-gradient(circle at 72% 4%, color-mix(in srgb, var(--blue) 13%, transparent), transparent 30%),
        radial-gradient(circle at 8% 100%, color-mix(in srgb, var(--blue) 7%, transparent), transparent 26%),
        var(--ink);
      opacity: 0;
      transform: scale(1.02);
      transition: opacity 1s var(--ease), transform 1s var(--ease);
    }
    .showcase.is-ready { opacity: 1; transform: scale(1); }
    .showcase::before { content: ""; position: absolute; inset: 0; pointer-events: none; background-image: linear-gradient(var(--line-soft) 1px, transparent 1px), linear-gradient(90deg, var(--line-soft) 1px, transparent 1px); background-size: 64px 64px; mask-image: radial-gradient(circle at center, black, transparent 76%); opacity: .18; }
    .device {
      position: relative;
      width: min(1600px, 100%);
      height: 100%;
      margin: 0 auto;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: clamp(14px, 1.7vw, 24px);
      background: var(--paper-soft);
      box-shadow: var(--shadow);
    }
    .device-bar { position: absolute; z-index: 5; top: 0; left: 0; right: 0; display: flex; height: 28px; align-items: center; justify-content: space-between; padding: 0 13px; border-bottom: 1px solid rgba(0, 0, 0, .08); color: rgba(0, 0, 0, .54); background: rgba(255, 255, 255, .88); backdrop-filter: blur(16px); font-size: 9px; }
    .device-brand { display: flex; align-items: center; gap: 7px; font-weight: 750; }
    .device-brand i { width: 11px; height: 11px; border-radius: 4px; background: var(--ink); box-shadow: 4px -4px 0 -2px var(--blue); }
    .device-dots { display: flex; gap: 6px; }
    .device-dots i { width: 7px; height: 7px; border-radius: 50%; background: rgba(0, 0, 0, .16); }
    .shot-viewport { position: absolute; inset: 28px 0 0; overflow: hidden; background: var(--paper); }
    .shot {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transform: scale(1.012);
      filter: saturate(.98) contrast(1.01);
      transition: opacity .7s var(--ease), transform 4.6s linear;
    }
    .shot.active { opacity: 1; transform: scale(1); }
    .shot.leaving { opacity: 0; transform: scale(.995); }
    .screen-sheen { position: absolute; z-index: 3; inset: 0; pointer-events: none; background: linear-gradient(115deg, rgba(255,255,255,.11), transparent 18%, transparent 78%, rgba(255,255,255,.04)); mix-blend-mode: screen; }

    .scene-caption { position: fixed; z-index: 10; left: clamp(22px, 4vw, 64px); bottom: clamp(18px, 3vw, 40px); display: flex; align-items: center; gap: 12px; pointer-events: none; }
    .scene-number { display: grid; width: 36px; height: 36px; place-items: center; border: 1px solid var(--line); border-radius: 11px; background: var(--glass); backdrop-filter: blur(18px); font-size: 10px; font-weight: 800; }
    .scene-copy { padding: 9px 14px; border: 1px solid var(--line); border-radius: 12px; background: var(--glass); backdrop-filter: blur(18px); box-shadow: 0 14px 38px rgba(0,0,0,.24); }
    .scene-copy b { display: block; font-size: 11px; }
    .scene-copy small { display: block; margin-top: 2px; color: var(--muted); font-size: 8px; }
    .controls { position: fixed; z-index: 11; right: clamp(22px, 4vw, 64px); bottom: clamp(18px, 3vw, 40px); display: flex; align-items: center; gap: 6px; padding: 7px; border: 1px solid var(--line); border-radius: 14px; background: var(--glass); backdrop-filter: blur(18px); box-shadow: 0 14px 38px rgba(0,0,0,.24); }
    .control { display: grid; width: 30px; height: 30px; padding: 0; place-items: center; border: 0; border-radius: 9px; background: transparent; cursor: pointer; }
    .control:hover { background: var(--line); }
    .timeline { display: flex; gap: 5px; padding: 0 4px; }
    .timeline button { width: 6px; height: 6px; padding: 0; border: 0; border-radius: 99px; background: rgba(255,255,255,.25); cursor: pointer; transition: .35s var(--ease); }
    .timeline button.active { width: 22px; background: var(--blue); box-shadow: 0 0 15px color-mix(in srgb, var(--blue) 55%, transparent); }
    .preload-status { position: fixed; z-index: 30; left: 50%; bottom: 24px; transform: translateX(-50%); color: var(--muted); font-size: 10px; letter-spacing: .08em; }

    @keyframes stars { to { transform: translate3d(58px, 58px, 0); } }
    @keyframes orbit-in { from { opacity: 0; transform: scale(.35) rotate(-38deg); } to { opacity: 1; transform: scale(1) rotate(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes logo-in { to { opacity: 1; transform: scale(1) rotate(0); } }
    @keyframes title-in { to { opacity: 1; transform: translateY(0); } }
    @keyframes fade-in { to { opacity: 1; } }
    @keyframes launch { from { transform: translateX(-130%); } to { transform: translateX(270%); } }

    @media (max-width: 800px) {
      .showcase { padding: 8px; }
      .device { border-radius: 12px; }
      .device-bar { height: 22px; }
      .shot-viewport { inset-block-start: 22px; }
      .scene-copy { display: none; }
      .timeline { max-width: 120px; overflow: hidden; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <section class="opening" id="opening" aria-label="Vesper 开场动画">
    <div class="opening-core">
      <div class="orbit"></div>
      <svg class="brand-logo" viewBox="0 0 48 48" role="img" aria-label="Vesper">
        <path fill="currentColor" d="M3.5 13 L10.5 13 L21 29.5 L31.5 13 L38.5 13 L21 42 Z"></path>
        <path fill="var(--blue)" d="M41 1 Q41.9 5.1 46 6 Q41.9 6.9 41 11 Q40.1 6.9 36 6 Q40.1 5.1 41 1 Z"></path>
      </svg>
      <h1>Vesper</h1>
      <p>Run independent AI agents in parallel</p>
    </div>
    <div class="launch-line"></div>
  </section>

  <main class="showcase" id="showcase">
    <div class="device">
      <div class="device-bar"><span class="device-brand"><i></i>Vesper</span><span class="device-dots"><i></i><i></i><i></i></span></div>
      <div class="shot-viewport"><img class="shot active" id="shotA" alt="Vesper 页面演示" /><img class="shot" id="shotB" alt="Vesper 页面演示" /><div class="screen-sheen"></div></div>
    </div>
  </main>

  <div class="scene-caption hidden" id="caption"><span class="scene-number" id="number">01</span><span class="scene-copy"><b id="title">对话</b><small id="description">多会话并行</small></span></div>
  <div class="controls hidden" id="controls">
    <button class="control" id="previous" aria-label="上一个页面">←</button>
    <button class="control" id="toggle" aria-label="暂停播放">Ⅱ</button>
    <div class="timeline" id="timeline" aria-label="演示页面进度"></div>
    <button class="control" id="next" aria-label="下一个页面">→</button>
    <button class="control" id="restart" aria-label="重新播放">↻</button>
  </div>
  <span class="preload-status" id="preloadStatus">正在准备真实页面…</span>

  <script>
    const scenes = [
      ['shots/chat-grid.png', '多会话并行', '多个独立 Agent 会话同时运行，各自拥有模型、权限、上下文与工作目录'],
      ['shots/chat.png', '聚集对话', '专注单个 Agent，会话内切换模型、权限、附件与工作目录'],
      ['shots/history.png', '历史会话', '搜索、分页与会话管理'],
      ['shots/assets.png', '资产', '统一管理 Agent 生成的文件与视觉内容'],
      ['shots/channels.png', '渠道', '飞书与个人微信双向连接'],
      ['shots/schedules.png', '定时任务', '灵活频率、完整时区与多渠道通知'],
      ['shots/plugins.png', '插件', '管理 Agent 可以调用的工具能力'],
      ['shots/memory.png', '星忆', '项目知识、偏好与决策的关联星图'],
      ['shots/mcp.png', 'MCP', '结构化配置外部服务与工具'],
      ['shots/skills.png', '技能', '安装、启用与自动触发可复用能力'],
      ['shots/workflows.png', '工作流', '预设、自定义编排与运行管理'],
      ['shots/workflow-builder.png', '工作流画布', '用端点拖拽连接真实执行节点'],
      ['shots/config.png', '模型配置', '同时管理多个 Provider、模型地址、认证与运行策略'],
      ['shots/config-notifications.png', '通知设置', '对话、定时任务与工作流共用可配置通知模板'],
      ['shots/config-interface.png', '界面设置', '切换界面语言与信息密度'],
      ['shots/config-updates.png', '应用更新', '检查版本、查看更新日志并连接 GitHub Releases'],
    ]
    const opening = document.querySelector('#opening')
    const showcase = document.querySelector('#showcase')
    const controls = document.querySelector('#controls')
    const caption = document.querySelector('#caption')
    const timeline = document.querySelector('#timeline')
    const status = document.querySelector('#preloadStatus')
    const images = [document.querySelector('#shotA'), document.querySelector('#shotB')]
    const toggle = document.querySelector('#toggle')
    let activeLayer = 0
    let index = 0
    let paused = false
    let timer = null
    let ready = false
    const duration = 4500

    timeline.innerHTML = scenes.map((scene, sceneIndex) => `<button data-index="${sceneIndex}" aria-label="查看${scene[1]}"></button>`).join('')

    function preload() {
      return Promise.all(scenes.map(([src]) => new Promise(resolve => {
        const image = new Image()
        image.onload = resolve
        image.onerror = resolve
        image.src = src
      })))
    }

    function updateMeta() {
      document.querySelector('#number').textContent = String(index + 1).padStart(2, '0')
      document.querySelector('#title').textContent = scenes[index][1]
      document.querySelector('#description').textContent = scenes[index][2]
      document.querySelectorAll('.timeline button').forEach((button, buttonIndex) => button.classList.toggle('active', buttonIndex === index))
    }

    function showScene(nextIndex, restartTimer = true) {
      index = (nextIndex + scenes.length) % scenes.length
      const incoming = images[1 - activeLayer]
      const outgoing = images[activeLayer]
      incoming.src = scenes[index][0]
      incoming.classList.remove('leaving')
      requestAnimationFrame(() => {
        outgoing.classList.add('leaving')
        outgoing.classList.remove('active')
        incoming.classList.add('active')
        activeLayer = 1 - activeLayer
      })
      updateMeta()
      if (restartTimer) schedule()
    }

    function schedule() {
      clearTimeout(timer)
      if (!paused && ready) timer = setTimeout(() => showScene(index + 1), duration)
    }

    function setPaused(value) {
      paused = value
      toggle.textContent = paused ? '▶' : 'Ⅱ'
      toggle.setAttribute('aria-label', paused ? '继续播放' : '暂停播放')
      schedule()
    }

    function begin() {
      if (!ready) return
      images[activeLayer].src = scenes[0][0]
      updateMeta()
      opening.classList.add('is-leaving')
      showcase.classList.add('is-ready')
      controls.classList.remove('hidden')
      caption.classList.remove('hidden')
      schedule()
    }

    preload().then(() => {
      ready = true
      status.classList.add('hidden')
      setTimeout(begin, window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 150 : 3500)
    })

    document.querySelector('#previous').addEventListener('click', () => showScene(index - 1))
    document.querySelector('#next').addEventListener('click', () => showScene(index + 1))
    toggle.addEventListener('click', () => setPaused(!paused))
    timeline.addEventListener('click', event => {
      const button = event.target.closest('button[data-index]')
      if (button) showScene(Number(button.dataset.index))
    })
    document.querySelector('#restart').addEventListener('click', () => {
      clearTimeout(timer)
      controls.classList.add('hidden')
      caption.classList.add('hidden')
      showcase.classList.remove('is-ready')
      opening.classList.remove('is-leaving')
      const animated = opening.querySelectorAll('.brand-logo, h1, p, .orbit, .launch-line')
      animated.forEach(element => { element.style.animation = 'none'; void element.offsetWidth; element.style.animation = '' })
      index = 0
      setTimeout(begin, 3500)
    })
    document.addEventListener('keydown', event => {
      if (event.key === 'ArrowLeft') showScene(index - 1)
      if (event.key === 'ArrowRight') showScene(index + 1)
      if (event.key === ' ') { event.preventDefault(); setPaused(!paused) }
      if (event.key.toLowerCase() === 'r') document.querySelector('#restart').click()
    })
  </script>
</body>
</html>
