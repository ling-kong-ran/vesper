<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Vesper — 在暮色中，让多个 AI Agent 沿各自轨道并行工作。" />
    <title>Vesper</title>
    <script>
      try {
        const stored = localStorage.getItem('vesper-theme')
        const storedLanguage = localStorage.getItem('vesper-language')
        const dark = stored === 'dark' || (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.dataset.theme = dark ? 'dark' : 'light'
        document.documentElement.lang = storedLanguage === 'en-US' ? 'en-US' : 'zh-CN'
      } catch {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
